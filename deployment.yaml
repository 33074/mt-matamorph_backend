apiVersion: apps/v1
kind: Deployment
metadata:
  name: mt-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mt-backend
  template:
    metadata:
      labels:
        app: mt-backend
    spec:
      containers:
      - name: mt-backend
        image: mt-medimorph-backend
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: mt-backend-service
spec:
  type: NodePort
  selector:
    app: mt-backend
  ports:
  - port: 80
    targetPort: 5002
    nodePort: 30008   # Changed from 30007
